[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Netlify's secrets scanner (correctly, in general) fails the build if an
  # env var's value turns up anywhere in the build output. False positive
  # here: ADMIN_PIN's value (now removed from the app entirely, but still
  # present in old git history) happens to coincidentally match unrelated
  # text inside third-party files vendored by firebase-admin's own
  # dependencies (not our code, nothing actually leaked) — so we skip
  # scanning node_modules entirely.
  #
  # SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES is NOT set here on purpose
  # (2026-07-12, after a GitHub secret-scanning alert on this file): it
  # used to list the production and dev Firebase Web apiKeys -- both
  # intentionally public (Firebase's own design; access is controlled by
  # Firestore/Storage rules and Firebase Auth, not by hiding this value),
  # already committed in plaintext in js/core.js where the app needs them,
  # already shipped to every visitor's browser. But their "AIza..." shape
  # trips pattern-matching secret scanners regardless of actual
  # sensitivity, and GitHub's scanner (unlike Netlify's) flags the literal
  # value ANYWHERE it appears in tracked files -- including this omit-list
  # itself, which is exactly backwards (fixing one scanner's false
  # positive by giving a second scanner the same string to flag). Same two
  # values are now set as a Netlify UI env var instead (Site configuration
  # > Environment variables > SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES,
  # same comma-separated value, All scopes) -- functionally identical for
  # Netlify's build (env vars merge regardless of source), but the literal
  # key values no longer sit in a second tracked file for GitHub to flag.
  SECRETS_SCAN_OMIT_PATHS = "node_modules/**"

[functions]
  # firebase-admin pulls in Google Cloud SDK packages with dynamic requires
  # that Netlify's esbuild-based function bundler is known to choke on.
  # Marking it external tells the bundler to leave it in node_modules and
  # resolve it at runtime instead of trying to inline it — the documented
  # fix for this exact class of build failure.
  external_node_modules = ["firebase-admin"]
