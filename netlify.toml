[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Netlify's secrets scanner (correctly, in general) fails the build if an
  # env var's value turns up anywhere in the build output. Two false
  # positives here: (1) ADMIN_PIN's value happens to coincidentally match
  # unrelated text inside third-party files vendored by firebase-admin's
  # own dependencies (not our code, nothing actually leaked) — so we skip
  # scanning node_modules entirely; (2) the Firebase Web API key baked
  # into index.html is intentionally public (Firebase's own design —
  # access is controlled by Firestore rules, not by hiding this value),
  # but its "AIza..." shape trips the scanner's pattern heuristic anyway.
  SECRETS_SCAN_OMIT_PATHS = "node_modules/**"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyBZRMpIWde-6DPpg7yAvNOqJAQF5ZBxlAg"

[functions]
  # firebase-admin pulls in Google Cloud SDK packages with dynamic requires
  # that Netlify's esbuild-based function bundler is known to choke on.
  # Marking it external tells the bundler to leave it in node_modules and
  # resolve it at runtime instead of trying to inline it — the documented
  # fix for this exact class of build failure.
  external_node_modules = ["firebase-admin"]
