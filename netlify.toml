[build]
  # The rules-deploy step runs in EVERY context (Production, Deploy
  # Previews, Branch deploys, Preview Server & Agent Runners) and derives
  # its target project solely from that context's own FIREBASE_SERVICE_
  # ACCOUNT -- see scripts/deploy-firestore-rules.js for why, and "The
  # Firestore rules trap" in DEV_NOTES.md for the incident this replaces
  # (a promoted feature's rules were never published to production; the
  # app failed with "Missing or insufficient permissions" live). Chained
  # with && so a failed rules deploy fails the WHOLE build -- a green
  # build that silently skipped publishing rules is the exact failure
  # this exists to prevent.
  command = "npm install && node scripts/deploy-firestore-rules.js"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Netlify's secrets scanner (correctly, in general) fails the build if an
  # env var's value turns up anywhere in the build output. False positive
  # here: ADMIN_PIN's value (now removed from the app entirely, but still
  # present in old git history) happens to coincidentally match unrelated
  # text inside third-party files vendored by firebase-admin's own
  # dependencies (not our code, nothing actually leaked) — so we skip
  # scanning node_modules entirely.
  #
  # SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES lists both Firebase Web
  # apiKeys (production + dev) -- both intentionally public (Firebase's
  # own design: this key identifies the project to Google's servers, it
  # does not grant access; Firestore/Storage rules and Firebase Auth are
  # what actually gate access), already committed in plaintext in
  # js/core.js where the app needs them, already shipped to every
  # visitor's browser. Real incident, 2026-07-12: this line was removed
  # from here (after a GitHub secret-scanning alert on the same two public
  # keys) in favor of setting it as a Netlify UI env var instead -- that
  # left three consecutive dev deploys silently failing to build at all
  # ("Exposed secrets detected", exit code 2) because Netlify's OWN build
  # scanner had nothing telling it to skip these values anymore, and the
  # UI env var was never confirmed live. A broken build blocks every
  # future deploy; a GitHub false-positive alert on a value that's
  # deliberately public and already committed elsewhere in the repo is
  # cosmetic. Restored here, committed, self-contained -- doesn't depend
  # on a separate dashboard step being done correctly. If the GitHub alert
  # needs addressing again, dismiss it there as a false positive rather
  # than removing this line.
  SECRETS_SCAN_OMIT_PATHS = "node_modules/**"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyBZRMpIWde-6DPpg7yAvNOqJAQF5ZBxlAg,AIzaSyCuL04xUkChHjtQe4ros6SG_AOIXLyspTw"

[functions]
  # firebase-admin pulls in Google Cloud SDK packages with dynamic requires
  # that Netlify's esbuild-based function bundler is known to choke on.
  # Marking it external tells the bundler to leave it in node_modules and
  # resolve it at runtime instead of trying to inline it — the documented
  # fix for this exact class of build failure.
  external_node_modules = ["firebase-admin"]

[functions."inspection-reports"]
  # Netlify Scheduled Functions -- invokes inspection-reports.js's handler
  # automatically on this cadence with a body of {"next_run": "<ISO date>"}
  # and no way to attach custom headers, which is exactly the signal
  # inspection-reports.js uses to recognize this as Netlify's own scheduler
  # (vs. the manual "Check for New Inspection Reports" button, which always
  # carries a real, permission-checked owner/admin token). Briefly removed
  # while chasing a build failure that turned out to be the missing
  # SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES above, not this -- restored
  # once the real cause was confirmed. Every 30 minutes is a starting
  # point, not a hard requirement -- Mark can tighten or loosen this
  # without any code change.
  schedule = "*/30 * * * *"
